# .pre-commit-config.yaml
repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-shebang-scripts-are-executable
      - id: check-toml
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=600']
      - id: debug-statements
      - id: mixed-line-ending
        args: ['--fix=auto']

  # Ruff for Python linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # UV lock file management
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.9
    hooks:
      - id: uv-lock
        files: ^pyproject\.toml$

  # Rust tooling (local system hooks — uses your installed toolchain)
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-check
        name: cargo check
        entry: cargo check --workspace
        language: system
        types: [rust]
        pass_filenames: false

ci:
  autofix_commit_msg: '[pre-commit.ci] Auto format from pre-commit.com hooks'
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  # pre-commit.ci doesn't have Rust installed — skip system hooks there
  # (these are already covered by CI workflow)
  skip: [cargo-fmt, cargo-clippy, cargo-check]
