site_name: SeqPacker
site_url: https://alphakhaw.github.io/seqpacker/docs/
site_description: High-performance sequence packing for LLM training, written in Rust with Python bindings.
site_author: AlphaKhaw

repo_name: AlphaKhaw/seqpacker
repo_url: https://github.com/AlphaKhaw/seqpacker

copyright: Copyright &copy; 2026 AlphaKhaw

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
      - Algorithms: user-guide/algorithms.md
      - Batch Packing: user-guide/batch-packing.md
      - Streaming: user-guide/streaming.md
      - Training Integration: user-guide/training.md
      - NumPy Support: user-guide/numpy.md
  - API Reference: api.md
  - Performance: performance.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - tables
