<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SeqPacker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }
    h1 {
      font-size: 3rem;
      color: #f0f6fc;
      margin-bottom: 0.5rem;
    }
    p.tagline {
      font-size: 1.1rem;
      color: #8b949e;
      margin-bottom: 2.5rem;
    }
    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    a.card {
      display: block;
      padding: 1.25rem 2rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #58a6ff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: border-color 0.2s, background 0.2s;
      min-width: 180px;
    }
    a.card:hover {
      border-color: #58a6ff;
      background: #1c2129;
    }
    a.card span {
      display: block;
      color: #8b949e;
      font-size: 0.85rem;
      font-weight: 400;
      margin-top: 0.25rem;
    }
    .github {
      margin-top: 2rem;
    }
    .github a {
      color: #8b949e;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .github a:hover { color: #c9d1d9; }
  </style>
</head>
<body>
  <div class="container">
    <h1>SeqPacker</h1>
    <p class="tagline">High-performance sequence packing for LLM training</p>
    <div class="links">
      <a class="card" href="docs/">
        Documentation
        <span>Guides, API reference, examples</span>
      </a>
      <a class="card" href="benchmarks/">
        Benchmarks
        <span>Interactive performance dashboard</span>
      </a>
    </div>
    <div class="github">
      <a href="https://github.com/AlphaKhaw/seqpacker">github.com/AlphaKhaw/seqpacker</a>
    </div>
  </div>
</body>
</html>
